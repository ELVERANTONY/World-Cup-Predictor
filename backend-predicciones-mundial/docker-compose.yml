version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "3001:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
      - api3
    restart: unless-stopped

  api1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/worldcup_predictor
      - JWT_SECRET=your-secret
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_SECRET=your-refresh-secret
      - JWT_REFRESH_EXPIRES_IN=30d
      - CORS_ORIGIN=*
      - RATE_LIMIT_WINDOW=15
      - RATE_LIMIT_MAX=100
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    restart: unless-stopped

  api2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/worldcup_predictor
      - JWT_SECRET=your-secret
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_SECRET=your-refresh-secret
      - JWT_REFRESH_EXPIRES_IN=30d
      - CORS_ORIGIN=*
      - RATE_LIMIT_WINDOW=15
      - RATE_LIMIT_MAX=100
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    restart: unless-stopped

  api3:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/worldcup_predictor
      - JWT_SECRET=your-secret
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_SECRET=your-refresh-secret
      - JWT_REFRESH_EXPIRES_IN=30d
      - CORS_ORIGIN=*
      - RATE_LIMIT_WINDOW=15
      - RATE_LIMIT_MAX=100
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: worldcup_predictor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
